<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Digital Doppelgänger</title>

<style>
body {
  margin: 0;
  background: #0e0e0e;
  color: white;
  font-family: "Segoe UI", sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.panel {
  flex: 1;
  padding: 40px;
  transition: 0.5s;
}

#you {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
}

#doppel {
  background: linear-gradient(135deg, #000000, #3a0ca3);
}

h2 {
  text-align: center;
  opacity: 0.9;
}

textarea {
  width: 90%;
  height: 120px;
  padding: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 10px 25px;
  border: none;
  border-radius: 20px;
  background: #ff006e;
  color: white;
  cursor: pointer;
}

.response {
  margin-top: 20px;
  font-size: 18px;
  min-height: 80px;
}

#conflict {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="panel" id="you">
  <h2>🧍 You</h2>
  <textarea id="input" placeholder="Type what you're thinking..."></textarea><br>
  <button onclick="think()">Think</button>
  <div class="response" id="youResponse"></div>
</div>

<div class="panel" id="doppel">
  <h2>👤 Doppelgänger</h2>
  <div class="response" id="doppelResponse"></div>
</div>

<div id="conflict">Conflict Level: 0%</div>

<script>
let conflict = 0;

const distortions = {
  "i": "you",
  "am": "pretend to be",
  "happy": "uncertain",
  "sad": "comfortable in sadness",
  "alone": "finally free",
  "love": "dependency",
  "trust": "weakness",
  "fear": "truth",
  "safe": "trapped"
};

function distortText(text) {
  return text.split(" ").map(word => {
    let lower = word.toLowerCase();
    return distortions[lower] || word;
  }).join(" ");
}

function think() {
  let input = document.getElementById("input").value;
  if (!input) return;

  document.getElementById("youResponse").innerText =
    "You: " + input;

  let altered = distortText(input);

  document.getElementById("doppelResponse").innerText =
    "Doppelgänger: " + altered;

  conflict = Math.min(100, conflict + Math.floor(Math.random() * 15) + 5);
  document.getElementById("conflict").innerText =
    "Conflict Level: " + conflict + "%";

  if (conflict > 60) {
    document.body.style.filter = "contrast(120%) saturate(140%)";
  }
  if (conflict > 85) {
    document.getElementById("doppelResponse").innerText +=
      "\n\nAre you sure you're the real one?";
  }
}
</script>

</body>
</html>
